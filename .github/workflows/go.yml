name: Build for OpenWrt 24.04, Linux, and Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          # OpenWrt 设备 - aarch64_cortex-a53
          - { goos: linux, goarch: arm64, name: aarch64_cortex-a53, ext: "", platform: "OpenWrt" }
          # OpenWrt 设备 - x86_64
          - { goos: linux, goarch: amd64, name: openwrt_x86_64, ext: "", platform: "OpenWrt" }
          # Linux x86_64 通用版本（适配低版本内核 4.4）
          - { goos: linux, goarch: amd64, name: linux_x86_64, ext: "", platform: "Linux" }
          # Windows - x86_64
          - { goos: windows, goarch: amd64, name: windows_x86_64, ext: ".exe", platform: "Windows" }
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 设置低版本兼容编译环境（Linux 专用）
        if: matrix.target.platform == 'Linux' && matrix.target.goos == 'linux'
        run: |
          echo "🔧 配置低版本内核兼容编译参数"
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build for target
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: 0
        run: |
          echo "🔨 Building for ${{ matrix.target.platform }} - ${{ matrix.target.name }}"
          echo "   GOOS=$GOOS, GOARCH=$GOARCH"
          echo "   Go version: $(go version)"
          
          go mod download
          
          BINARY_NAME="sh-tel-iptv-spider_${{ matrix.target.name }}${{ matrix.target.ext }}"
          
          if [ "${{ matrix.target.platform }}" = "Linux" ] && [ "${{ matrix.target.goos }}" = "linux" ]; then
            echo "🐧 使用 musl 进行静态编译，兼容 Linux 内核 4.4+"
            CC=musl-gcc CGO_ENABLED=1 \
            go build -ldflags="-s -w -extldflags '-static'" \
                     -tags "osusergo,netgo,static_build" \
                     -o "$BINARY_NAME" .
          else
            go build -ldflags="-s -w -extldflags '-static'" \
                     -o "$BINARY_NAME" .
          fi
          
          if [ "${{ matrix.target.goos }}" = "linux" ]; then
            echo "🔍 检查二进制文件依赖:"
            ldd "$BINARY_NAME" 2>&1 || echo "✅ 静态编译，无动态依赖"
            file "$BINARY_NAME"
          fi
          
          zip "${BINARY_NAME}.zip" "$BINARY_NAME"
          ls -lh *.zip

      - name: Upload artifacts (临时存储)
        uses: actions/upload-artifact@v4
        with:
          name: sh-tel-iptv-spider-${{ matrix.target.name }}
          path: sh-tel-iptv-spider_${{ matrix.target.name }}*.zip
          retention-days: 7
          if-no-files-found: error

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🆕 生成版本号（语义化版本 + 日期）
        id: version
        run: |
          echo "📋 当前所有 tags:"
          git tag -l
          
          # 1. 从项目根目录读取基础版本号
          VERSION_FILE="version.txt"
          if [ -f "$VERSION_FILE" ]; then
            # 读取并去除可能存在的前后空格或换行符
            BASE_VERSION_RAW=$(cat "$VERSION_FILE" | tr -d '\r' | xargs)
            echo "📄 从 ${VERSION_FILE} 读取到基础版本: ${BASE_VERSION_RAW}"
          else
            echo "⚠️ 未找到 ${VERSION_FILE}，将默认使用 1.0.0 作为基础版本"
            BASE_VERSION_RAW="1.0.0"
          fi
          
          # 解析 version.txt 中的 MAJOR 和 MINOR 
          # 比如 0.3.0 -> MAJOR=0, MINOR=3 (PATCH 强制从 0 开始自增，或作为初始值)
          IFS='.' read -r FILE_MAJOR FILE_MINOR FILE_PATCH <<< "$BASE_VERSION_RAW"
          
          # 如果解析失败，赋默认值
          FILE_MAJOR=${FILE_MAJOR:-1}
          FILE_MINOR=${FILE_MINOR:-0}
          
          # 获取当前日期
          CURRENT_DATE=$(date +'%Y%m%d')
          echo "📅 当前日期: ${CURRENT_DATE}"
          
          # 2. 查找符合当前 [MAJOR].[MINOR] 前缀规范的历史 tags (格式: vX.Y.Z-YYYYMMDD)
          PREFIX_PATTERN="^v${FILE_MAJOR}\.${FILE_MINOR}\.[0-9]+-[0-9]{8}$"
          echo "🔍 查找匹配前缀 v${FILE_MAJOR}.${FILE_MINOR}.xx 的历史 tags..."
          
          # 使用 || true 避免 grep 无匹配时返回非零退出状态码
          VALID_TAGS=$(git tag -l "v${FILE_MAJOR}.${FILE_MINOR}.*" | grep -E "$PREFIX_PATTERN" || true)
          echo "📝 匹配的 tags 列表:"
          echo "$VALID_TAGS"
          
          # 3. 计算新版本号的 PATCH (xx)
          if [ -z "$VALID_TAGS" ]; then
            # 如果没有找到任何匹配该前缀的 tag，说明是该大版本下的第一次构建，PATCH 从 0 开始
            echo "📌 未找到匹配前缀的 tag，将从 v${FILE_MAJOR}.${FILE_MINOR}.0-${CURRENT_DATE} 开始"
            MAJOR=$FILE_MAJOR
            MINOR=$FILE_MINOR
            PATCH=0
          else
            # 优先查找当天、且匹配前缀的 tags
            TODAY_TAGS=$(echo "$VALID_TAGS" | grep "${CURRENT_DATE}$" || true)
            LATEST_TAG=$(echo "$TODAY_TAGS" | tail -n 1)
            
            if [ -z "$LATEST_TAG" ]; then
              # 当天没有匹配前缀的版本，取历史最新匹配的前缀版本
              echo "📌 当天没有找到符合前缀的版本，查找历史最新匹配版本..."
              LATEST_HISTORIC_TAG=$(echo "$VALID_TAGS" | tail -n 1)
              echo "📌 历史最新匹配版本: ${LATEST_HISTORIC_TAG}"
              
              # 提取版本号部分（去掉日期后缀和开头的 v）
              BASE_VERSION=$(echo "$LATEST_HISTORIC_TAG" | sed 's/-[0-9]\{8\}$//' | sed 's/^v//')
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
              
              # 补丁版本自增 1 
              PATCH=$((PATCH + 1))
            else
              # 当天已有匹配前缀的版本，在当天的基础上继续自增
              echo "📌 当天最新匹配版本: ${LATEST_TAG}"
              
              BASE_VERSION=$(echo "$LATEST_TAG" | sed 's/-[0-9]\{8\}$//' | sed 's/^v//')
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
              
              PATCH=$((PATCH + 1))
            fi
          fi
          
          # 4. 生成并输出新版本号
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-${CURRENT_DATE}"
          TAG="v${NEW_VERSION}"
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "name=Release ${TAG}" >> $GITHUB_OUTPUT
          echo "📌 新版本: ${TAG}"
          
          # 获取短 commit hash
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          
          # 显示所有 tags
          echo ""
          echo "📋 当前所有 tags 列表:"
          git tag -l | sort -V

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 重组文件结构
        run: |
          echo "📦 原始下载结构:"
          find ./artifacts -type f
          
          mkdir -p ./release_files
          find ./artifacts -type f -name "*.zip" | while read file; do
            filename=$(basename "$file")
            cp "$file" "./release_files/${filename}"
          done
          
          echo "📦 重组后的文件:"
          ls -la ./release_files/
          
          echo "📊 文件大小信息:"
          for file in ./release_files/*; do
            size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
            size_mb=$(echo "scale=2; $size/1024/1024" | bc)
            echo "$(basename $file): ${size_mb} MB"
          done

      - name: Generate release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SHORT_SHA="${{ steps.version.outputs.sha }}"
          VERSION="${{ steps.version.outputs.version }}"
          
          cat > release_notes.md << EOF
          ## 📋 版本信息
          - **版本**: ${TAG}
          - **Commit**: ${SHORT_SHA}
          - **构建时间**: $(date +'%Y-%m-%d %H:%M:%S')
          - **构建分支**: ${GITHUB_REF_NAME}
          
          ## 📦 包含平台
          
          ### 🐧 OpenWrt 版本（针对路由器优化）
          - **sh-tel-iptv-spider_aarch64_cortex-a53.zip**: Cortex-A53 64位 ARM 设备（OpenWrt）
          - **sh-tel-iptv-spider_openwrt_x86_64.zip**: x86_64 架构 OpenWrt 设备
          
          ### 🐧 Linux 通用版本（适配低版本内核）
          - **sh-tel-iptv-spider_linux_x86_64.zip**: Linux x86_64 通用版本
            - ✅ 静态编译，无 glibc 依赖
            - ✅ 兼容 Linux 内核 4.4+
            - ✅ 适用 Ubuntu/CentOS/Debian/Alpine 等
          
          ### 🪟 Windows 版本
          - **sh-tel-iptv-spider_windows_x86_64.zip**: Windows 64位系统
          
          ## 🚀 使用方法
          
          ### Linux 通用版本（内核 4.4+）
          1. 下载 \`sh-tel-iptv-spider_linux_x86_64.zip\`
          2. 解压：\`unzip sh-tel-iptv-spider_linux_x86_64.zip\`
          3. 赋予执行权限：\`chmod +x sh-tel-iptv-spider_linux_x86_64\`
          4. 修改config.yaml配置
          5. 运行程序：\`./sh-tel-iptv-spider_linux_x86_64 -h\`
          
          ### OpenWrt 设备
          1. 下载对应架构的 zip 文件
          2. 解压：\`unzip sh-tel-iptv-spider_<架构>.zip\`
          3. 上传到设备：\`scp sh-tel-iptv-spider_<架构> root@192.168.1.1:/root/\`
          4. 赋予执行权限：\`chmod +x /root/sh-tel-iptv-spider_<架构>\`
          5. 修改config.yaml配置
          6. 运行程序：\`/root/sh-tel-iptv-spider_<架构> -h\`
          
          ### Windows
          1. 下载 \`sh-tel-iptv-spider_windows_x86_64.zip\`
          2. 解压到任意目录
          3. 修改config.yaml配置
          4. 运行：\`sh-tel-iptv-spider_windows_x86_64.exe -h\`
          
          ## ⚠️ 注意事项
          - 所有版本均为静态编译，不依赖外部库
          - Linux 版本使用 musl 静态编译，兼容内核 4.4+
          - OpenWrt 版本需要能访问上海电信 IPTV 专网
          - 需要配置 MySQL/Sqlite(默认) 数据库连接
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            ./release_files/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 显示 Release 创建信息
        run: |
          echo "✅ Release 创建成功！"
          echo "🔗 访问地址: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
          echo "📦 上传的文件:"
          ls -la ./release_files/
