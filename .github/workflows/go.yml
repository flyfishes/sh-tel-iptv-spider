name: Build for OpenWrt 24.04

on:
  workflow_dispatch:  # 手动触发
  push:              # 推送到 main 分支时自动构建
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          # aarch64_cortex-a53 (你的 OpenWrt 设备)
          - { goos: linux, goarch: arm64, name: aarch64_cortex-a53 }
          # x86_64 (通用 x86 设备)
          - { goos: linux, goarch: amd64, name: x86_64 }
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，用于生成版本号

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build for OpenWrt
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: 0
        run: |
          echo "Building for ${{ matrix.target.name }} (GOOS=$GOOS, GOARCH=$GOARCH)"
          echo "Go version: $(go version)"
          go mod download
          go build -ldflags="-s -w" -o sh-tel-iptv-spider_${{ matrix.target.name }} .
          ls -lh sh-tel-iptv-spider_*

      - name: Upload artifacts (临时存储)
        uses: actions/upload-artifact@v4
        with:
          name: sh-tel-iptv-spider-${{ matrix.target.name }}
          path: sh-tel-iptv-spider_${{ matrix.target.name }}
          retention-days: 7  # 临时文件保留7天

  # 🆕 新增：创建 Release 并上传所有产物
  create-release:
    needs: build  # 等待编译任务完成
    runs-on: ubuntu-latest
    # 只在 main 分支推送时创建 Release，手动触发时也创建
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write  # 需要写入权限创建 Release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts  # 下载到 artifacts 目录

      - name: List downloaded files
        run: |
          echo "📦 Downloaded artifacts:"
          ls -la ./artifacts/
          # 检查每个子目录
          for dir in ./artifacts/*/; do
            echo "📁 $dir:"
            ls -la "$dir"
          done

      - name: Generate release tag and name
        id: version
        run: |
          # 生成版本号：日期时间 + 短 commit hash
          DATE=$(date +'%Y%m%d')
          TIME=$(date +'%H%M%S')
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v${DATE}-${TIME}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "name=Release ${TAG}" >> $GITHUB_OUTPUT
          
          # 生成 Release 说明
          cat > release_notes.md << EOF
          ## 📋 版本信息
          - **Commit**: ${SHORT_SHA}
          - **构建时间**: $(date +'%Y-%m-%d %H:%M:%S')
          - **构建分支**: ${GITHUB_REF_NAME}
          
          ## 📦 包含架构
          - **aarch64_cortex-a53**: 适用于 Cortex-A53 64位 ARM 设备（如你的 OpenWrt 路由器）
          - **x86_64**: 适用于 x86_64 架构设备（软路由、虚拟机等）
          
          ## 🚀 使用方法
          1. 下载对应架构的二进制文件
          2. 上传到 OpenWrt 设备：\`scp sh-tel-iptv-spider_<架构> root@192.168.1.1:/root/\`
          3. 赋予执行权限：\`chmod +x /root/sh-tel-iptv-spider_<架构>\`
          4. 运行程序：\`/root/sh-tel-iptv-spider_<架构> -h\`
          
          ## ⚠️ 注意事项
          - 此版本为静态编译，不依赖外部库
          - 确保 OpenWrt 设备能访问上海电信 IPTV 专网
          - 需要配置 MySQL 数据库连接
          EOF
          
          echo "📝 Release notes prepared:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            ./artifacts/*/sh-tel-iptv-spider_*
          
          # 如果使用 token（默认使用 GITHUB_TOKEN）
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 显示 Release 创建信息
        run: |
          echo "✅ Release 创建成功！"
          echo "🔗 访问地址: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
          echo "📦 Tag: ${{ steps.version.outputs.tag }}"
