name: Build for OpenWrt 24.04, Linux, and Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          # OpenWrt 设备 - aarch64_cortex-a53
          - { goos: linux, goarch: arm64, name: aarch64_cortex-a53, ext: "", platform: "OpenWrt" }
          # OpenWrt 设备 - x86_64
          - { goos: linux, goarch: amd64, name: openwrt_x86_64, ext: "", platform: "OpenWrt" }
          # Linux x86_64 通用版本（适配低版本内核 4.4）
          - { goos: linux, goarch: amd64, name: linux_x86_64, ext: "", platform: "Linux" }
          # Windows - x86_64
          - { goos: windows, goarch: amd64, name: windows_x86_64, ext: ".exe", platform: "Windows" }
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 设置低版本兼容编译环境（Linux 专用）
        if: matrix.target.platform == 'Linux' && matrix.target.goos == 'linux'
        run: |
          echo "🔧 配置低版本内核兼容编译参数"
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build for target
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: 0
        run: |
          echo "🔨 Building for ${{ matrix.target.platform }} - ${{ matrix.target.name }}"
          echo "   GOOS=$GOOS, GOARCH=$GOARCH"
          echo "   Go version: $(go version)"
          
          go mod download
          
          BINARY_NAME="sh-tel-iptv-spider_${{ matrix.target.name }}${{ matrix.target.ext }}"
          
          if [ "${{ matrix.target.platform }}" = "Linux" ] && [ "${{ matrix.target.goos }}" = "linux" ]; then
            echo "🐧 使用 musl 进行静态编译，兼容 Linux 内核 4.4+"
            CC=musl-gcc CGO_ENABLED=1 \
            go build -ldflags="-s -w -extldflags '-static'" \
                     -tags "osusergo,netgo,static_build" \
                     -o "$BINARY_NAME" .
          else
            go build -ldflags="-s -w -extldflags '-static'" \
                     -o "$BINARY_NAME" .
          fi
          
          if [ "${{ matrix.target.goos }}" = "linux" ]; then
            echo "🔍 检查二进制文件依赖:"
            ldd "$BINARY_NAME" 2>&1 || echo "✅ 静态编译，无动态依赖"
            file "$BINARY_NAME"
          fi
          
          zip "${BINARY_NAME}.zip" "$BINARY_NAME"
          ls -lh *.zip

      - name: Upload artifacts (临时存储)
        uses: actions/upload-artifact@v4
        with:
          name: sh-tel-iptv-spider-${{ matrix.target.name }}
          path: sh-tel-iptv-spider_${{ matrix.target.name }}*.zip
          retention-days: 7
          if-no-files-found: error

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      # 🆕 需要读取权限来获取 tags
      pull-requests: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 🆕 获取所有 tags
          fetch-tags: true

      - name: 🆕 获取所有现有 tags
        id: get_tags
        run: |
          echo "📋 获取所有现有 tags:"
          git tag -l "v*" | sort -V
          
          # 获取最新版本号
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n 1)
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          
          if [ -z "$LATEST_TAG" ]; then
            echo "latest_version=0" >> $GITHUB_OUTPUT
            echo "📌 没有找到现有版本，将从 v1.0.0 开始"
          else
            # 提取版本号数字部分（去掉 v 前缀）
            VERSION_NUM=$(echo "$LATEST_TAG" | sed 's/^v//' | sed 's/-.*//')
            echo "latest_version=${VERSION_NUM}" >> $GITHUB_OUTPUT
            echo "📌 最新版本: ${LATEST_TAG} (版本号: ${VERSION_NUM})"
          fi

      - name: 🆕 计算下一个版本号（语义化版本 vX.Y.Z）
        id: version
        run: |
          LATEST_VERSION="${{ steps.get_tags.outputs.latest_version }}"
          
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "0" ]; then
            # 如果没有版本，从 v1.0.0 开始
            MAJOR=1
            MINOR=0
            PATCH=0
          else
            # 解析语义化版本号 vX.Y.Z
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            
            # 🆕 每次构建增加补丁版本号（Z）
            PATCH=$((PATCH + 1))
            
            # 如果补丁版本号达到 100，则进位
            if [ $PATCH -ge 100 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            
            # 如果次版本号达到 100，则进位
            if [ $MINOR -ge 100 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
          fi
          
          # 生成新版本号
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${NEW_VERSION}"
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "name=Release ${TAG}" >> $GITHUB_OUTPUT
          echo "📌 新版本: ${TAG}"
          
          # 获取短 commit hash 用于 Release 说明
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 重组文件结构
        run: |
          echo "📦 原始下载结构:"
          find ./artifacts -type f
          
          mkdir -p ./release_files
          find ./artifacts -type f -name "*.zip" | while read file; do
            filename=$(basename "$file")
            cp "$file" "./release_files/${filename}"
          done
          
          echo "📦 重组后的文件:"
          ls -la ./release_files/
          
          echo "📊 文件大小信息:"
          for file in ./release_files/*; do
            size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
            size_mb=$(echo "scale=2; $size/1024/1024" | bc)
            echo "$(basename $file): ${size_mb} MB"
          done

      - name: Generate release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SHORT_SHA="${{ steps.version.outputs.sha }}"
          VERSION="${{ steps.version.outputs.version }}"
          
          cat > release_notes.md << EOF
          ## 📋 版本信息
          - **版本**: ${TAG}
          - **Commit**: ${SHORT_SHA}
          - **构建时间**: $(date +'%Y-%m-%d %H:%M:%S')
          - **构建分支**: ${GITHUB_REF_NAME}
          
          ## 📦 包含平台
          
          ### 🐧 OpenWrt 版本（针对路由器优化）
          - **sh-tel-iptv-spider_aarch64_cortex-a53.zip**: Cortex-A53 64位 ARM 设备（你的 OpenWrt 路由器）
          - **sh-tel-iptv-spider_openwrt_x86_64.zip**: x86_64 架构 OpenWrt 设备
          
          ### 🐧 Linux 通用版本（适配低版本内核）
          - **sh-tel-iptv-spider_linux_x86_64.zip**: Linux x86_64 通用版本
            - ✅ 静态编译，无 glibc 依赖
            - ✅ 兼容 Linux 内核 4.4+
            - ✅ 适用 Ubuntu/CentOS/Debian/Alpine 等
          
          ### 🪟 Windows 版本
          - **sh-tel-iptv-spider_windows_x86_64.zip**: Windows 64位系统
          
          ## 🚀 使用方法
          
          ### Linux 通用版本（内核 4.4+）
          1. 下载 \`sh-tel-iptv-spider_linux_x86_64.zip\`
          2. 解压：\`unzip sh-tel-iptv-spider_linux_x86_64.zip\`
          3. 赋予执行权限：\`chmod +x sh-tel-iptv-spider_linux_x86_64\`
          4. 运行程序：\`./sh-tel-iptv-spider_linux_x86_64 -h\`
          
          ### OpenWrt 设备
          1. 下载对应架构的 zip 文件
          2. 解压：\`unzip sh-tel-iptv-spider_<架构>.zip\`
          3. 上传到设备：\`scp sh-tel-iptv-spider_<架构> root@192.168.1.1:/root/\`
          4. 赋予执行权限：\`chmod +x /root/sh-tel-iptv-spider_<架构>\`
          5. 运行程序：\`/root/sh-tel-iptv-spider_<架构> -h\`
          
          ### Windows
          1. 下载 \`sh-tel-iptv-spider_windows_x86_64.zip\`
          2. 解压到任意目录
          3. 运行：\`sh-tel-iptv-spider_windows_x86_64.exe -h\`
          
          ## ⚠️ 注意事项
          - 所有版本均为静态编译，不依赖外部库
          - Linux 版本使用 musl 静态编译，兼容内核 4.4+
          - OpenWrt 版本需要能访问上海电信 IPTV 专网
          - 需要配置 MySQL 数据库连接
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            ./release_files/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 显示 Release 创建信息
        run: |
          echo "✅ Release 创建成功！"
          echo "🔗 访问地址: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
          echo "📦 上传的文件:"
          ls -la ./release_files/
